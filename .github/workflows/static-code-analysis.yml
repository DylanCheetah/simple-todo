name: Static Code Analysis
on: [push]
jobs:
  lint-python-code:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install flake8
      run: |
        pip install flake8
    - name: Run flake8
      run: |
        cd simple_todo
        flake8
  lint-javascript-code:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Run JSHint
      run: |
        cd simple-todo-frontend
        npm lint
